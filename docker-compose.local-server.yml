services:
  web:
    build: .
    container_name: tank-candy-web
    user: "0:0"
    command: sh /app/container-web.sh
    environment:
      FLASK_DEBUG: "1"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      WEB_SERVER: ${WEB_SERVER:-flask}
      DATABASE_PATH: /app/runtime-data/fuel_prices.db
      SEED_DATA_PATH: /app/data/seed_fuel_data.json
      APP_TIMEZONE: America/New_York
    volumes:
      - .:/app
      - fuel_data:/app/runtime-data
    networks:
      - webproxy
      - default

  scheduler:
    build: .
    user: "0:0"
    command: python -m fuel_jobs run-scheduler
    environment:
      DATABASE_PATH: /app/runtime-data/fuel_prices.db
      SEED_DATA_PATH: /app/data/seed_fuel_data.json
      APP_TIMEZONE: America/New_York
    volumes:
      - .:/app
      - fuel_data:/app/runtime-data
    networks:
      - default

volumes:
  fuel_data:

networks:
  webproxy:
    external: true
  default:
